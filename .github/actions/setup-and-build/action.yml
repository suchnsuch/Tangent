name: Setup and Build
description: Checks out the repo, sets up Node, installs dependencies, and builds.

runs:
  using: composite
  steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - uses: actions/setup-node@v5
      with:
        node-version: 24
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash

    - name: Build
      run: npm run build:tangent-electron
      shell: bash
