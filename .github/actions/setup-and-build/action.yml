name: Setup and Build
description: Checks out the repo, sets up Node, installs dependencies, and builds.

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v5
      with:
        # Version downgrade forced by https://github.com/nodejs/node/issues/63487
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash

    - name: Install Electron binary
      run: npx electron --version
      shell: bash

    - name: Build
      run: npm run build:tangent-electron
      shell: bash
